name: Generate Passage Status

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

concurrency:
  group: generate-status-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整历史记录才能获取所有的 commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate passage_status.json
        run: |
          python -c '
          import os, json, subprocess

          result = {}
          # 遍历当前目录
          for root, dirs, files in os.walk("."):
              # 忽略掉 .git 和 .github 目录
              if ".git" in root or ".github" in root:
                  continue
          
              for file in files:
                  if file.endswith(".md"):
                      filepath = os.path.join(root, file)
                      # 修改点：不再只取 -1 条，而是取这个文件的所有历史记录
                      # 格式化输出: %h(短哈希)|%aN(作者)|%aI(ISO时间)|%s(提交信息)
                      cmd = ["git", "log", "--format=%h|%aN|%aI|%s", filepath]
                      try:
                          output = subprocess.check_output(cmd).decode("utf-8").strip()
                          if output:
                              lines = output.split("\n")
                              history_list = []
          
                              for line in lines:
                                  # 按 | 分割，最多分割3次（防止提交信息中含有 | 字符导致解析报错）
                                  parts = line.split("|", 3)
                                  if len(parts) == 4:
                                      history_list.append({
                                          "hash": parts[0],
                                          "author": parts[1],
                                          "date": parts[2],
                                          "message": parts[3]
                                      })
          
                              if history_list:
                                  # 取第一条作为最后编辑状态（因为 git log 默认按时间倒序排，第一条就是最新的）
                                  latest = history_list[0]
                                  clean_path = filepath.lstrip("./")
          
                                  result[clean_path] = {
                                      "author": latest["author"],
                                      "last_edited": latest["date"],
                                      "history": history_list  # 把完整历史记录存进数组
                                  }
                      except Exception as e:
                          print(f"Error processing {filepath}: {e}")

          # 写入 JSON 文件
          with open("passage_status.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          '

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update passage_status.json with history [skip ci]"
          file_pattern: passage_status.json